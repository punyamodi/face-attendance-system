<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Face Attendance System{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af', 900:'#1e3a8a' },
            surface: '#0f172a',
            card: '#1e293b',
            border: '#334155',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 h-full flex">

  <aside id="sidebar" class="w-64 min-h-screen bg-slate-900 border-r border-slate-700 flex flex-col flex-shrink-0 transition-all duration-200">
    <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-700">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">FA</div>
      <span class="font-semibold text-white text-sm leading-tight">Face Attendance<br><span class="text-blue-400 font-normal text-xs">System v2</span></span>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/live" class="nav-link {% if request.url.path == '/live' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.362a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        Live Attendance
      </a>
      <a href="/persons" class="nav-link {% if '/persons' in request.url.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        People
      </a>
      <a href="/subjects" class="nav-link {% if request.url.path == '/subjects' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Subjects
      </a>
      <a href="/reports" class="nav-link {% if request.url.path == '/reports' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Reports
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-slate-700">
      <div id="model-status" class="px-3 py-2 rounded-lg bg-slate-800 text-xs text-slate-400">
        Loading model status...
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">
    <header class="h-16 bg-slate-900 border-b border-slate-700 flex items-center justify-between px-6">
      <h1 class="text-sm font-medium text-slate-300">{% block header %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-3">
        <div id="live-badge" class="hidden items-center gap-1.5 px-3 py-1 bg-green-500/10 border border-green-500/30 rounded-full text-green-400 text-xs font-medium">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          Session Active
        </div>
        <a href="/persons/register" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors">
          Register Person
        </a>
      </div>
    </header>

    <main class="flex-1 p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
    <div id="toast-inner" class="px-4 py-3 rounded-lg shadow-xl text-sm font-medium text-white max-w-sm"></div>
  </div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
